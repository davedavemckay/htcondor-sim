<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HTCondor Glidein Simulator</title>
    <!-- Load stlite CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.css" />
  </head>
  <body>
    <!-- The Streamlit app will be rendered inside this div -->
    <div id="root"></div>
    
    <!-- Load stlite JS -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: [],
          entrypoint: "app.py",
          files: {
            "app.py": `
import streamlit as st
import time

st.set_page_config(
    page_title="HTCondor Glidein Simulator",
    page_icon="🦅",
    layout="wide"
)

# Hide default Streamlit styling for a cleaner dashboard look
st.markdown("""
    <style>
        #MainMenu {visibility: hidden;}
        header {visibility: hidden;}
        footer {visibility: hidden;}
        .block-container {padding-top: 2rem;}
    </style>
""", unsafe_allow_html=True)

# -----------------------------------------------------------------------------
# INITIALIZE STATE
# -----------------------------------------------------------------------------
if "s" not in st.session_state:
    st.session_state.s = {
        "slurm_nodes": 6,
        "node_cpus": 16,
        "mem_per_core": 4,        # Global constraint: GiB per core
        "nodes": [],              # Physical nodes: {id, total_cpus, total_mem, used_cpus, used_mem}
        "slurm_queue": [],        # Pending glideins: {id, cpus, mem}
        "active_glideins": [],    # Running glideins: {id, node_id, cpus, mem, used_cpus, used_mem, idle_since}
        "htcondor_queue": [],     # Pending payloads: {id, cpus, mem}
        "active_jobs": [],        # Running payloads: {id, cpus, mem, glidein_id, progress}
        "completed_tasks": 0,
        "next_g_id": 1,
        "next_j_id": 1,
        "auto_scale": True,
        "eff_history": []
    }

s = st.session_state.s

# Helper to generate nodes based on mode
def generate_nodes():
    if s.get("arch_mode", "Homogeneous") == "Homogeneous":
        mem = s.get("node_cpus", 16) * s.get("mem_per_core", 4)
        return [{"id": f"Node-{i+1}", "total_cpus": s.get("node_cpus", 16), "total_mem": mem, "used_cpus": 0, "used_mem": 0} for i in range(s.get("slurm_nodes", 6))]
    else:
        nodes = []
        for i in range(6):
            nodes.append({"id": f"node0{i}", "total_cpus": 64, "total_mem": 256, "used_cpus": 0, "used_mem": 0})
        for i in range(6):
            nodes.append({"id": f"node1{i}", "total_cpus": 128, "total_mem": 512, "used_cpus": 0, "used_mem": 0})
        return nodes

expected_nodes = generate_nodes()
needs_reset = False

# Check if current nodes match expected configuration
if len(s["nodes"]) != len(expected_nodes):
    needs_reset = True
elif s["nodes"] and expected_nodes and (s["nodes"][0]["total_cpus"] != expected_nodes[0]["total_cpus"] or s["nodes"][-1]["total_cpus"] != expected_nodes[-1]["total_cpus"]):
    needs_reset = True

if needs_reset:
    s["nodes"] = expected_nodes
    s["slurm_queue"] = []
    s["active_glideins"] = []
    s["active_jobs"] = []
    s["htcondor_queue"] = []
    s["completed_tasks"] = 0
    s["next_g_id"] = 1
    s["next_j_id"] = 1
    s["eff_history"] = []

# -----------------------------------------------------------------------------
# SIDEBAR CONTROLS
# -----------------------------------------------------------------------------
with st.sidebar:
    st.title("🎛️ Controls")
    
    st.header("1. Infrastructure")
    s["arch_mode"] = st.radio("Cluster Architecture", ["Homogeneous", "Heterogeneous"])
    
    if s["arch_mode"] == "Homogeneous":
        s["slurm_nodes"] = st.slider("Number of Slurm Nodes", 1, 20, s.get("slurm_nodes", 6))
        s["node_cpus"] = st.slider("CPUs per Node", 4, 64, s.get("node_cpus", 16), step=4)
        s["mem_per_core"] = st.selectbox("Memory per Core (GiB)", [2, 4, 8], index=1)
        max_cluster_cpu = s["node_cpus"]
        max_cluster_mem = s["node_cpus"] * s["mem_per_core"]
    else:
        st.info("Heterogeneous Mode: 6x (64C/256G) and 6x (128C/512G)")
        max_cluster_cpu = 128
        max_cluster_mem = 512
    
    st.markdown("---")
    st.header("2. Glidein Factory (Slurm)")
    s["auto_scale"] = st.toggle("Auto-Scaler (Demand-Driven)", s.get("auto_scale", True))
    req_glidein_cpus = st.slider("Manual Glidein CPUs", 1, max_cluster_cpu, max(1, max_cluster_cpu//2))
    
    if st.button("Submit Manual Glidein", use_container_width=True):
        req_glidein_mem = req_glidein_cpus * 4 
        if s["arch_mode"] == "Homogeneous":
            req_glidein_mem = req_glidein_cpus * s["mem_per_core"]
        s["slurm_queue"].append({"id": f"Glidein-{s['next_g_id']}", "cpus": req_glidein_cpus, "mem": req_glidein_mem})
        s["next_g_id"] += 1
        
    if st.button("Kill Oldest Glidein", use_container_width=True):
        if s["active_glideins"]:
            g = s["active_glideins"].pop(0)
            # Free the physical Node
            for n in s["nodes"]:
                if n["id"] == g["node_id"]:
                    n["used_cpus"] -= g["cpus"]
                    n["used_mem"] -= g["mem"]
                    break
            # Return interrupted jobs back to the HTCondor Queue
            active_keeps = []
            for j in s["active_jobs"]:
                if j["glidein_id"] == g["id"]:
                    j["progress"] = 0
                    s["htcondor_queue"].insert(0, j)
                else:
                    active_keeps.append(j)
            s["active_jobs"] = active_keeps

    st.markdown("---")
    st.header("3. Workload (HTCondor)")
    payload_cpus = st.slider("Payload CPU Size", 1, max_cluster_cpu, 2)
    payload_mem = st.slider("Payload Memory (GiB)", 1, max_cluster_mem, payload_cpus * 2)
    
    if st.button("Submit Payloads (x5)", type="primary", use_container_width=True):
        for _ in range(5):
            s["htcondor_queue"].append({"id": f"Job-{s['next_j_id']}", "cpus": payload_cpus, "mem": payload_mem})
            s["next_j_id"] += 1

needs_rerun = False
current_time = time.time()

# -----------------------------------------------------------------------------
# EXECUTION ENGINE
# -----------------------------------------------------------------------------
# Engine Step 1: Process Slurm Queue (Provision hardware - Dual Bin-Packing)
if s["slurm_queue"]:
    for g in s["slurm_queue"][:]:
        # Find a physical node with enough free CPUs AND Memory
        for n in s["nodes"]:
            if (n["total_cpus"] - n["used_cpus"] >= g["cpus"]) and (n["total_mem"] - n["used_mem"] >= g["mem"]):
                n["used_cpus"] += g["cpus"]
                n["used_mem"] += g["mem"]
                g["node_id"] = n["id"]
                g["used_cpus"] = 0
                g["used_mem"] = 0
                g["idle_since"] = current_time
                s["active_glideins"].append(g)
                s["slurm_queue"].remove(g)
                needs_rerun = True
                break

# Engine Step 2: HTCondor Late Binding (Bin-packing payloads into glideins)
if s["htcondor_queue"] and s["active_glideins"]:
    for j in s["htcondor_queue"][:]:
        for g in s["active_glideins"]:
            if (g["cpus"] - g["used_cpus"] >= j["cpus"]) and (g["mem"] - g["used_mem"] >= j["mem"]):
                g["used_cpus"] += j["cpus"]
                g["used_mem"] += j["mem"]
                g["idle_since"] = None # No longer idle!
                j["glidein_id"] = g["id"]
                j["progress"] = 0
                s["active_jobs"].append(j)
                s["htcondor_queue"].remove(j)
                needs_rerun = True
                break

# Engine Step 3: Advance running jobs
if s["active_jobs"]:
    needs_rerun = True
    active_keeps = []
    for j in s["active_jobs"]:
        j["progress"] += j.get("progress_rate", 25) 
        if j["progress"] >= 100:
            s["completed_tasks"] += 1
            # Free up CPUs and MEM on the active glidein
            for g in s["active_glideins"]:
                if g["id"] == j["glidein_id"]:
                    g["used_cpus"] -= j["cpus"]
                    g["used_mem"] -= j["mem"]
                    break
        else:
            active_keeps.append(j)
    s["active_jobs"] = active_keeps

# Engine Step 4: Idle Timeout Logic (15s)
active_keeps = []
for g in s["active_glideins"]:
    if g["used_cpus"] == 0 and g["used_mem"] == 0:
        if g.get("idle_since") is None:
            g["idle_since"] = current_time
        elif current_time - g["idle_since"] >= 15:
            g["timeout"] = True
    else:
        g["idle_since"] = None
        
    if g.get("timeout"):
        # Evict and free physical Slurm Node
        for n in s["nodes"]:
            if n["id"] == g["node_id"]:
                n["used_cpus"] -= g["cpus"]
                n["used_mem"] -= g["mem"]
                break
    else:
        active_keeps.append(g)
        if g.get("idle_since") is not None:
            needs_rerun = True 
s["active_glideins"] = active_keeps

# Engine Step 5: Factory Auto-Scaler (Demand-Driven Provisioning)
if s.get("auto_scale", True) and s["htcondor_queue"]:
    max_job_cpu = max((j["cpus"] for j in s["htcondor_queue"]), default=0)
    max_job_mem = max((j["mem"] for j in s["htcondor_queue"]), default=0)
    
    max_glidein_cpu = max([g["cpus"] for g in s["active_glideins"]] + [g["cpus"] for g in s["slurm_queue"]] + [0])
    max_glidein_mem = max([g["mem"] for g in s["active_glideins"]] + [g["mem"] for g in s["slurm_queue"]] + [0])
    
    max_cluster_cpu = max([n["total_cpus"] for n in s["nodes"]], default=0)
    max_cluster_mem = max([n["total_mem"] for n in s["nodes"]], default=0)
    
    if max_job_cpu > max_glidein_cpu or max_job_mem > max_glidein_mem:
        # Stranded job! Submit a custom glidein large enough to fit it
        if max_job_cpu <= max_cluster_cpu and max_job_mem <= max_cluster_mem:
            if s.get("arch_mode") == "Heterogeneous":
                g_cpu, g_mem = (128, 512) if max_job_cpu > 64 or max_job_mem > 256 else (64, 256)
            else:
                g_cpu, g_mem = s["node_cpus"], s["node_cpus"] * s["mem_per_core"]
            
            s["slurm_queue"].append({"id": f"Glidein-{s['next_g_id']}", "cpus": g_cpu, "mem": g_mem})
            s["next_g_id"] += 1
            needs_rerun = True
    else:
        # Volume check for CPU and Memory
        idle_cpus = sum(g["cpus"] - g["used_cpus"] for g in s["active_glideins"])
        pending_cpus = sum(g["cpus"] for g in s["slurm_queue"])
        needed_cpus = sum(j["cpus"] for j in s["htcondor_queue"])
        
        idle_mem = sum(g["mem"] - g["used_mem"] for g in s["active_glideins"])
        pending_mem = sum(g["mem"] for g in s["slurm_queue"])
        needed_mem = sum(j["mem"] for j in s["htcondor_queue"])
        
        if needed_cpus > (idle_cpus + pending_cpus) or needed_mem > (idle_mem + pending_mem):
            if len(s["slurm_queue"]) < len(s["nodes"]):
                if s.get("arch_mode") == "Heterogeneous":
                    g_cpu, g_mem = 64, 256
                else:
                    g_cpu, g_mem = s["node_cpus"], s["node_cpus"] * s["mem_per_core"]
                s["slurm_queue"].append({"id": f"Glidein-{s['next_g_id']}", "cpus": g_cpu, "mem": g_mem})
                s["next_g_id"] += 1
                needs_rerun = True

# Engine Step 6: Track CPU Efficiency
current_alloc_cpu = sum(g["cpus"] for g in s["active_glideins"])
current_used_cpu = sum(g["used_cpus"] for g in s["active_glideins"])
current_eff = (current_used_cpu / current_alloc_cpu * 100) if current_alloc_cpu > 0 else 0.0

s["eff_history"].append(current_eff)
if len(s["eff_history"]) > 60:
    s["eff_history"].pop(0)

# -----------------------------------------------------------------------------
# RENDER UI
# -----------------------------------------------------------------------------
st.title("🦅 Advanced HTCondor/Slurm Simulator")
st.markdown("Explore **Multi-Dimensional Bin-Packing**. Glideins reserve chunks of physical nodes. HTCondor jobs then dynamically pack into those active Glideins based on both **CPU** and **Memory** requirements.")

# --- HTCONDOR OVERLAY ZONE ---
st.markdown("### 🦅 HTCondor Overlay Network")
c1, c2, c3, c4, c5 = st.columns(5)
c1.metric("Queued Jobs", len(s["htcondor_queue"]))
c2.metric("Queued Resources", f"{sum(j['cpus'] for j in s['htcondor_queue'])}C | {sum(j['mem'] for j in s['htcondor_queue'])}G")
c3.metric("Active Slots (Glideins)", len(s["active_glideins"]))
c4.metric("Completed Tasks", s["completed_tasks"])
c5.metric("CPU Efficiency", f"{current_eff:.1f}%")

st.area_chart(s["eff_history"], height=150)

if s["htcondor_queue"]:
    top_job = s['htcondor_queue'][0]
    st.warning(f"**Top of HTCondor Queue:** Next job requires **{top_job['cpus']} CPUs** and **{top_job['mem']} GiB RAM**.")

if not s["active_glideins"]:
    st.info("No Active Glideins. Submit HTCondor payloads to watch the Auto-Scaler automatically provision resources!")
else:
    g_cols = st.columns(min(len(s["active_glideins"]), 4))
    for i, g in enumerate(s["active_glideins"]):
        with g_cols[i % 4]:
            st.markdown(f"**{g['id']}** *(on {g['node_id']})*")
            cpu_pct = min(g["used_cpus"] / g["cpus"], 1.0)
            mem_pct = min(g["used_mem"] / g["mem"], 1.0)
            
            if g.get("idle_since"):
                idle_time = int(current_time - g["idle_since"])
                st.caption(f"⏱️ Idle for {idle_time}s (Timeout at 15s)")
                st.progress(cpu_pct, text=f"CPU: {g['used_cpus']}/{g['cpus']}")
                st.progress(mem_pct, text=f"MEM: {g['used_mem']}/{g['mem']}G")
            else:
                st.progress(cpu_pct, text=f"CPU: {g['used_cpus']}/{g['cpus']}")
                st.progress(mem_pct, text=f"MEM: {g['used_mem']}/{g['mem']}G")

st.markdown("---")

# --- SLURM PHYSICAL ZONE ---
st.markdown("### 🖥️ Underlying Slurm Cluster (Hardware)")

if s["slurm_queue"]:
    q_str = ", ".join([f"{g['id']} ({g['cpus']}C|{g['mem']}G)" for g in s["slurm_queue"]])
    st.warning(f"**Slurm Queue:** {q_str}. (Waiting for free volume on a single node)")
else:
    st.caption("Slurm Queue is empty.")

# Generate Responsive Proportional HTML Grid
html_grid = "<div style='display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; align-items: flex-end;'>"
for n in s["nodes"]:
    size = 110 + (n["total_cpus"] * 0.75) 
    
    # Calculate CPU aggregation
    glidein_cpus = sum(g["cpus"] for g in s["active_glideins"] if g["node_id"] == n["id"])
    payload_cpus = sum(g["used_cpus"] for g in s["active_glideins"] if g["node_id"] == n["id"])
    glidein_cpu_pct = min((glidein_cpus / n["total_cpus"]) * 100, 100)
    payload_cpu_pct = min((payload_cpus / n["total_cpus"]) * 100, 100)
    
    # Calculate Memory aggregation
    glidein_mem = sum(g["mem"] for g in s["active_glideins"] if g["node_id"] == n["id"])
    payload_mem = sum(g["used_mem"] for g in s["active_glideins"] if g["node_id"] == n["id"])
    glidein_mem_pct = min((glidein_mem / n["total_mem"]) * 100, 100)
    payload_mem_pct = min((payload_mem / n["total_mem"]) * 100, 100)
    
    node_id = n["id"]
    total_cpus = n["total_cpus"]
    total_mem = n["total_mem"]
    
    # Flat HTML string to avoid Streamlit Markdown parser issues
    html_grid += f"<div style='width: {size}px; height: {size}px; background-color: #e5e7eb; border: 2px solid #9ca3af; border-radius: 8px; position: relative; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);'>"
    html_grid += f"<div style='position: absolute; bottom: 0; left: 0; width: 50%; height: {glidein_cpu_pct}%; background-color: #86efac; transition: height 0.4s ease;'></div>"
    html_grid += f"<div style='position: absolute; bottom: 0; left: 0; width: 50%; height: {payload_cpu_pct}%; background-color: #3b82f6; transition: height 0.4s ease;'></div>"
    html_grid += f"<div style='position: absolute; bottom: 0; right: 0; width: 50%; height: {glidein_mem_pct}%; background-color: #d8b4fe; transition: height 0.4s ease;'></div>"
    html_grid += f"<div style='position: absolute; bottom: 0; right: 0; width: 50%; height: {payload_mem_pct}%; background-color: #a855f7; transition: height 0.4s ease;'></div>"
    html_grid += "<div style='position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background-color: #9ca3af; opacity: 0.5;'></div>"
    html_grid += f"<div style='position: absolute; top: 8px; left: 8px; font-family: sans-serif; color: #1f2937;'><strong style='font-size: 14px;'>{node_id}</strong><br/><span style='font-size: 11px; font-weight: bold;'>{total_cpus}C | {total_mem}G</span><br/></div>"
    html_grid += f"<div style='position: absolute; bottom: 4px; right: 8px; font-family: sans-serif; color: #1f2937; text-align: right; font-size: 10px; font-weight: 600; text-shadow: 0px 0px 3px rgba(255,255,255,0.8);'>Gld: {glidein_cpus}C | {glidein_mem}G<br/>Job: {payload_cpus}C | {payload_mem}G</div>"
    html_grid += "</div>"

html_grid += "</div>"

# Visual Legend
html_grid += "<div style='margin-top: 20px; display: flex; flex-wrap: wrap; gap: 15px; font-family: sans-serif; font-size: 12px; align-items: center; color: #374151;'>"
html_grid += "<div style='display: flex; align-items: center; gap: 5px;'><div style='width:12px; height:12px; background:#e5e7eb; border: 1px solid #9ca3af; border-radius:2px;'></div> Idle Node</div>"
html_grid += "<div style='display: flex; align-items: center; gap: 5px;'><div style='width:12px; height:12px; background:#86efac; border-radius:2px;'></div> CPU Reserved</div>"
html_grid += "<div style='display: flex; align-items: center; gap: 5px;'><div style='width:12px; height:12px; background:#3b82f6; border-radius:2px;'></div> CPU Active</div>"
html_grid += "<div style='display: flex; align-items: center; gap: 5px;'><div style='width:12px; height:12px; background:#d8b4fe; border-radius:2px;'></div> Mem Reserved</div>"
html_grid += "<div style='display: flex; align-items: center; gap: 5px;'><div style='width:12px; height:12px; background:#a855f7; border-radius:2px;'></div> Mem Active</div>"
html_grid += "</div>"

st.markdown(html_grid, unsafe_allow_html=True)

if needs_rerun:
    time.sleep(0.5)
    st.rerun()
            `
          }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
