<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HTCondor Glidein Simulator</title>
    <!-- Load stlite CSS (Updated Version) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.css" />
  </head>
  <body>
    <!-- The Streamlit app will be rendered inside this div -->
    <div id="root"></div>
    
    <!-- Load stlite JS (Updated Version) -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: [], // No extra pip packages needed for this script
          entrypoint: "app.py",
          files: {
            "app.py": `
import streamlit as st
import time

# -----------------------------------------------------------------------------
# Configuration and Setup
# -----------------------------------------------------------------------------
st.set_page_config(
    page_title="HTCondor Glidein Simulator",
    page_icon="🦅",
    layout="wide"
)

# Initialize Complex State
if "sim_state" not in st.session_state:
    st.session_state.sim_state = {
        "slurm_nodes": 4,
        "node_cpus": 16,
        "nodes": [],              # List of dicts: {id, total_cpus, used_cpus}
        "slurm_queue": [],        # Pending glideins: {id, cpus}
        "active_glideins": [],    # Running pilots: {id, cpus, used_cpus, node_id}
        "htcondor_queue": [],     # User jobs: {id, cpus}
        "active_jobs": [],        # Running jobs: {id, cpus, glidein_id, progress}
        "completed_tasks": 0,
        "next_g_id": 1,
        "next_j_id": 1
    }
    # Provision initial physical nodes
    s = st.session_state.sim_state
    s["nodes"] = [{"id": f"N{i+1}", "total_cpus": 16, "used_cpus": 0} for i in range(4)]

s = st.session_state.sim_state

# -----------------------------------------------------------------------------
# Callbacks
# -----------------------------------------------------------------------------
def apply_cluster_config():
    """Resets the cluster with new physical hardware dimensions."""
    nodes = st.session_state.config_nodes
    cpus = st.session_state.config_cpus
    s["slurm_nodes"] = nodes
    s["node_cpus"] = cpus
    s["nodes"] = [{"id": f"N{i+1}", "total_cpus": cpus, "used_cpus": 0} for i in range(nodes)]
    s["slurm_queue"].clear()
    s["active_glideins"].clear()
    s["htcondor_queue"].clear()
    s["active_jobs"].clear()
    s["completed_tasks"] = 0

def submit_glidein():
    req_cpus = st.session_state.req_glidein_cpus
    s["slurm_queue"].append({"id": f"Glidein-{s['next_g_id']}", "cpus": req_cpus})
    s["next_g_id"] += 1

def submit_payload():
    req_cpus = st.session_state.req_job_cpus
    count = st.session_state.req_job_count
    for _ in range(count):
        s["htcondor_queue"].append({"id": f"Job-{s['next_j_id']}", "cpus": req_cpus})
        s["next_j_id"] += 1

def idle_out():
    """Kill the oldest active glidein and requeue its running jobs."""
    if s["active_glideins"]:
        g = s["active_glideins"].pop(0)
        # Free up CPUs on the physical Slurm Node
        for n in s["nodes"]:
            if n["id"] == g["node_id"]:
                n["used_cpus"] -= g["cpus"]
                break
        
        # Evict running jobs back to the HTCondor Queue (HTCondor handles this beautifully in real life)
        jobs_to_keep = []
        for j in s["active_jobs"]:
            if j["glidein_id"] == g["id"]:
                j["progress"] = 0
                j["glidein_id"] = None
                s["htcondor_queue"].insert(0, j) # Put back at front of queue
            else:
                jobs_to_keep.append(j)
        s["active_jobs"] = jobs_to_keep

# -----------------------------------------------------------------------------
# Scheduling Engine (The magic bin-packing)
# -----------------------------------------------------------------------------
needs_rerun = False

# 1. Slurm Scheduler: Try to map pending Glideins to physical Slurm Nodes
remaining_slurm_queue = []
for g in s["slurm_queue"]:
    scheduled = False
    for n in s["nodes"]:
        if n["total_cpus"] - n["used_cpus"] >= g["cpus"]:
            n["used_cpus"] += g["cpus"]
            s["active_glideins"].append({
                "id": g["id"], "cpus": g["cpus"], "used_cpus": 0, "node_id": n["id"]
            })
            scheduled = True
            needs_rerun = True
            break
    if not scheduled:
        remaining_slurm_queue.append(g)
s["slurm_queue"] = remaining_slurm_queue

# 2. HTCondor Scheduler: Try to map pending User Jobs to Active Glideins
remaining_htcondor_queue = []
for j in s["htcondor_queue"]:
    scheduled = False
    for g in s["active_glideins"]:
        if g["cpus"] - g["used_cpus"] >= j["cpus"]:
            g["used_cpus"] += j["cpus"]
            j["glidein_id"] = g["id"]
            j["progress"] = 0
            s["active_jobs"].append(j)
            scheduled = True
            needs_rerun = True
            break
    if not scheduled:
        remaining_htcondor_queue.append(j)
s["htcondor_queue"] = remaining_htcondor_queue

# 3. Execution Engine: Advance running jobs
if s["active_jobs"]:
    needs_rerun = True
    active_keeps = []
    for j in s["active_jobs"]:
        j["progress"] += 25 # takes 4 ticks to complete 100%
        if j["progress"] >= 100:
            s["completed_tasks"] += 1
            # Free up CPUs on the active glidein
            for g in s["active_glideins"]:
                if g["id"] == j["glidein_id"]:
                    g["used_cpus"] -= j["cpus"]
                    break
        else:
            active_keeps.append(j)
    s["active_jobs"] = active_keeps


# -----------------------------------------------------------------------------
# UI Render
# -----------------------------------------------------------------------------
st.title("🦅 Advanced HTCondor/Slurm Simulator")
st.markdown("Explore **Bin-Packing**: Glideins reserve chunks of physical nodes. HTCondor jobs then pack into those reserved Glideins.")

with st.sidebar:
    st.header("1. Infrastructure")
    st.slider("Physical Nodes", 1, 8, s["slurm_nodes"], key="config_nodes", on_change=apply_cluster_config)
    st.slider("CPUs per Node", 4, 64, s["node_cpus"], step=4, key="config_cpus", on_change=apply_cluster_config)
    
    st.markdown("---")
    st.header("2. Glidein Factory (Slurm)")
    st.slider("Glidein Size (CPUs)", 1, s["node_cpus"], max(1, s["node_cpus"]//2), key="req_glidein_cpus")
    st.button("Submit Glidein to Slurm", on_click=submit_glidein, use_container_width=True)
    st.button("Kill Oldest Glidein", on_click=idle_out, use_container_width=True)

    st.markdown("---")
    st.header("3. User Workload (HTCondor)")
    colA, colB = st.columns(2)
    with colA: st.number_input("Payload CPUs", 1, s["node_cpus"], 2, key="req_job_cpus")
    with colB: st.number_input("Batch Size", 1, 50, 5, key="req_job_count")
    st.button("Submit Payloads to HTCondor", on_click=submit_payload, type="primary", use_container_width=True)

# --- HTCONDOR OVERLAY ZONE ---
st.markdown("### 🦅 HTCondor Overlay Network")
c1, c2, c3, c4 = st.columns(4)
c1.metric("Queued Jobs", len(s["htcondor_queue"]))
c2.metric("Queued CPUs", sum(j["cpus"] for j in s["htcondor_queue"]))
c3.metric("Active Slots (Glideins)", len(s["active_glideins"]))
c4.metric("Completed Tasks", s["completed_tasks"])

if s["htcondor_queue"]:
    st.warning(f"**Top of HTCondor Queue:** Next job requires **{s['htcondor_queue'][0]['cpus']} CPUs**. If no single Glidein has this much capacity, it will wait forever!")

if not s["active_glideins"]:
    st.info("No Active Glideins providing resources. Submit a Glidein from the sidebar.")
else:
    g_cols = st.columns(min(len(s["active_glideins"]), 4))
    for i, g in enumerate(s["active_glideins"]):
        with g_cols[i % 4]:
            st.markdown(f"**{g['id']}** `(on {g['node_id']})`")
            pct = min(g["used_cpus"] / g["cpus"], 1.0)
            st.progress(pct, text=f"Running: {g['used_cpus']} / {g['cpus']} CPUs")

st.markdown("---")

# --- SLURM PHYSICAL ZONE ---
st.markdown("### 🖥️ Underlying Slurm Cluster (Hardware)")

if s["slurm_queue"]:
    q_str = ", ".join([f"{g['id']} ({g['cpus']}C)" for g in s["slurm_queue"]])
    st.warning(f"**Slurm Queue:** {q_str}. (Waiting for free CPUs on a single node)")
else:
    st.caption("Slurm Queue is empty.")

n_cols = st.columns(min(len(s["nodes"]), 4))
for i, n in enumerate(s["nodes"]):
    with n_cols[i % 4]:
        st.markdown(f"**{n['id']}**")
        pct = min(n["used_cpus"] / n["total_cpus"], 1.0)
        st.progress(pct, text=f"Allocated: {n['used_cpus']} / {n['total_cpus']} CPUs")

# Auto-drain animation loop
if needs_rerun:
    time.sleep(0.4) # Pause briefly so the user sees the progress bars animate
    st.rerun()
            `
          }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
